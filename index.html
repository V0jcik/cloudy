<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="gallery/Cloudy.png">
  <title>Cloudy</title>
</head>
<body>
  <div class="mcloudy">
    <div class="cloudyimg" id="cloudyimg"></div>
  </div>
  <div class="container my-5">
    <div class="cloudy">
    <div class="row">
      <div class="space col-md-4"></div>
        <div class="header col-md-8 my-1">
          <div class="bg">
            <span class="h3">Cloudy</span>
            <span class="fs-6">to chat bot, odpowiada na zadane mu polecenia. Przywitaj się <button class="command" onclick="javascript:(input.value = '!hi')(input.focus())">!hi</button></span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="space col-md-4"></div>
          <div class="chatarea col-md-8 my-1">
            <div class="bg">
              <span class="h3">Chat</span>
                <div class="chat col-12 my-2" id="chat">
                  <div class="row" id="row">
                    <p></p>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12 sparea">
                    <input type="text" id="name" autocomplete="off" class="col-12" onfocus="this.setSelectionRange(this.value.length, this.value.length);">
                    <button id="button" onclick="validate_text()">Enter</button>
                  </div>
                </div>
            </div>
          </div>
      </div>
    </div>
  </div>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
