<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
    *{
      font-family: 'Roboto Mono', monospace;
      text-shadow: 0 0.08em 0.1em  rgba(0, 0, 0, 0.459);
    }
    body{
      color: gold;
      font-size: 5em;
    }
    .center{
      z-index: 0;
      overflow: hidden;
      text-align: center;
      margin: 240px auto;
    }
    .center span{
      font-weight: 550;
    }
    .center i{
      opacity: 75%;
      margin-top: -20px;
      font-size: 55%;
    }
    .center p{
      margin-top: -10px;
      position: relative;
      right: -200px;
      font-size: 30%;
      color: rgba(128, 128, 128, 0.87);
    }
    .bloom{
      z-index: -1;
      position: absolute;
      top: 45%;
      left: 50%;
      width: 90%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 1000px 20px gold;
    }
    button{
      z-index: 5;
      margin: 0;
      padding: 0;
      position: absolute;
      top: 15px;
      left: 15px;
      cursor: pointer;
      font-size: 0.3em;
    }
    .darkmode {
      transition: 0.5s;
      background-color: rgb(24, 25, 26);
      border: rgb(24, 25, 26);
    }
    .fa-regular, .fa-solid {
      color: gold;
      font-size: 2em;
    }
    .fa-regular {
      text-shadow: 0 0.08em 0.1em  rgba(0, 0, 0, 0.459);
    }
    .fa-solid {
      text-shadow: 0 0.08em 0.1em  rgba(0, 0, 0, 0.459);
    }
    #darkmode {
      background-color: transparent;
      border: none;
    }
    .block{
      z-index: 3;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .links{
      position: relative;
      z-index: 6;
    }
    .fa-github{
      color: grey;
    }
    .fa-gradient {
      background: -webkit-gradient(linear, left bottom, right top, from(rgb(252, 193, 84)), to(rgb(158, 18, 223)));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .fa-linkedin{
      color: rgb(0, 117, 172);
    }
  </style>
</head>
<body class="darkmode">
  <button id="darkmode" onclick="chcolor()"><i id="icon" class="fa-regular fa-moon"></i></button>
  <div class="bloom"></div>
    <div class="center">
    <span>Strona w przebudowie</span><br>
    <p>Website under construction</p>
    <i>Stay tuned! </i><br>
    <div class="links">
      <a href="#" disabled><i class="fab fa-instagram fa-gradient"></i></a>
      <a href="https://github.com/V0jcik?tab=repositories"><i class="fab fa-github"></i></a>
      <a href="#"><i class="fab fa-linkedin"></i></a>
    </div>
  </div>
</body>
<div class="block"></div>
<script src="darkmode.js"></script>
<script src="https://kit.fontawesome.com/b9a7ea0ec0.js" crossorigin="anonymous"></script>
