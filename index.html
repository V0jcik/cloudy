<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="gallery/Cloudy.png">
  <title>Cloudy</title>
</head>
<body>
  <div class="container my-5">
    <div class="cloudy">
    <div class="row">
      <div class="space col-md-4"></div>
        <div class="header col-md-8 my-1">
          <div class="bg">
            <span class="h3">Cloudy</span>
            <span class="fs-6">to chat bot, odpowiada na zadane mu polecenia. Przywitaj się !hi</span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="space col-md-4"></div>
          <div class="chatarea col-md-8 my-1">
            <div class="bg">
              <span class="h3">Chat</span>
                <div class="chat col-12 my-2" id="chat">
                  <div class="row" id="row">
                    <p></p>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12 sparea">
                    <input type="text" id="name" autocomplete="off" class="col-12">
                    <button id="button" onclick="chceckfirstchar()">Enter</button>
                  </div>
                </div>
            </div>
          </div>
      </div>
      <div class="mcloudy d-md-none">
        <img src="gallery/Cloudy.png" alt="Cloudy by Marta">
      </div>
    </div>
  </div>

      <button id="clbutton" type="button" class="btn btn-primary popup" data-bs-toggle="modal" data-bs-target="#exampleModal"></button>

      <!-- Modal -->
      <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content clearpop">
            <div class="modal-header cl">
              <h5 class="modal-title" id="exampleModalLabel">Chat został wyczyszczony</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
          </div>
        </div>
    </div>

  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="js/bootstrap.js"></script>
<script src="bot.js"></script>
<script src="ban.js"></script>
